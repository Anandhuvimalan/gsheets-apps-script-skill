<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1020;
      --card: #ffffff;
      --field: #f4f5fb;
      --field-border: #e3e5f0;
      --text: #1a1c2e;
      --muted: #7a7f9a;
      --accent: #6d5cff;
      --accent-2: #a855f7;
      --accent-3: #22d3ee;
      --danger: #ef4444;
      --ok: #10b981;
      --radius: 16px;
      --shadow: 0 20px 60px -20px rgba(40, 20, 90, 0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    /* ============== LEFT / BRAND PANEL ============== */
    .brand {
      flex: 1.1;
      position: relative;
      overflow: hidden;
      padding: 56px 56px 48px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: #fff;
      background:
        radial-gradient(120% 120% at 0% 0%, #7c3aed 0%, transparent 55%),
        radial-gradient(120% 120% at 100% 100%, #06b6d4 0%, transparent 50%),
        linear-gradient(135deg, #1b1450 0%, #2a1a6b 45%, #0e1230 100%);
    }
    .brand::before,
    .brand::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(2px);
      opacity: 0.35;
      pointer-events: none;
    }
    .brand::before {
      width: 380px; height: 380px;
      right: -120px; top: -90px;
      background: radial-gradient(circle, rgba(168,85,247,.9), transparent 60%);
      animation: float 9s ease-in-out infinite;
    }
    .brand::after {
      width: 300px; height: 300px;
      left: -80px; bottom: -60px;
      background: radial-gradient(circle, rgba(34,211,238,.8), transparent 60%);
      animation: float 11s ease-in-out infinite reverse;
    }
    @keyframes float {
      0%,100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-26px) translateX(14px); }
    }

    .brand-top { position: relative; z-index: 1; }
    .logo {
      display: inline-flex; align-items: center; gap: 12px;
      font-weight: 700; letter-spacing: .3px; font-size: 15px;
    }
    .logo .dot {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: grid; place-items: center; font-size: 18px;
      box-shadow: 0 8px 20px -6px rgba(109,92,255,.8);
    }

    .hero { position: relative; z-index: 1; margin-top: auto; }
    .hero h1 {
      font-size: clamp(34px, 4vw, 52px);
      line-height: 1.05; font-weight: 800; letter-spacing: -1px;
      margin-bottom: 18px;
    }
    .hero h1 span {
      background: linear-gradient(90deg, #c4b5fd, #67e8f9);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .hero p {
      color: rgba(255,255,255,.72); font-size: 16px; max-width: 420px; line-height: 1.6;
    }

    .stats { position: relative; z-index: 1; display: flex; gap: 14px; margin-top: 40px; }
    .stat {
      flex: 1; padding: 18px 20px; border-radius: 14px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(6px);
    }
    .stat .num { font-size: 26px; font-weight: 800; }
    .stat .lbl { font-size: 12px; color: rgba(255,255,255,.6); margin-top: 4px; letter-spacing: .4px; text-transform: uppercase; }

    /* ============== RIGHT / FORM PANEL ============== */
    .form-side {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 48px 32px;
      background: #f7f8fc;
    }
    .card {
      width: 100%; max-width: 440px;
      animation: rise .6s cubic-bezier(.2,.8,.2,1) both;
    }
    @keyframes rise { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }

    .card h2 { font-size: 24px; font-weight: 700; letter-spacing: -.4px; }
    .card .sub { color: var(--muted); font-size: 14px; margin: 6px 0 28px; }

    .field { margin-bottom: 18px; }
    .field label {
      display: block; font-size: 13px; font-weight: 600;
      margin-bottom: 8px; color: #41435c;
    }
    .control {
      position: relative;
    }
    .control input,
    .control select {
      width: 100%;
      font-family: inherit; font-size: 15px; color: var(--text);
      padding: 14px 16px;
      background: var(--field);
      border: 1.5px solid var(--field-border);
      border-radius: 12px;
      outline: none;
      transition: border-color .18s, box-shadow .18s, background .18s;
      appearance: none;
    }
    .control select { cursor: pointer; padding-right: 42px; }
    .control input::placeholder { color: #aab0c6; }
    .control input:focus,
    .control select:focus {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(109,92,255,.14);
    }
    .control.has-icon::after {
      content: "▾";
      position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none; font-size: 12px;
    }

    .row { display: flex; gap: 14px; }
    .row .field { flex: 1; }

    .submit {
      width: 100%; margin-top: 8px;
      font-family: inherit; font-size: 15px; font-weight: 600; color: #fff;
      padding: 15px 18px; border: 0; border-radius: 12px; cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 12px 26px -10px rgba(109,92,255,.8);
      transition: transform .12s, box-shadow .2s, opacity .2s;
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    }
    .submit:hover { transform: translateY(-1px); box-shadow: 0 16px 30px -10px rgba(109,92,255,.9); }
    .submit:active { transform: translateY(0); }
    .submit:disabled { opacity: .7; cursor: not-allowed; transform: none; }

    .spinner {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,.45); border-top-color: #fff;
      animation: spin .7s linear infinite; display: none;
    }
    .submit.loading .spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .err {
      display: none;
      background: #fff1f1; color: #b42318;
      border: 1px solid #fcd7d4; border-radius: 10px;
      padding: 11px 14px; font-size: 13px; margin-bottom: 18px;
    }
    .err.show { display: block; }

    /* ============== TOAST ============== */
    .toast {
      position: fixed; top: 24px; right: 24px; z-index: 50;
      display: flex; align-items: center; gap: 12px;
      background: #fff; color: var(--text);
      padding: 14px 18px; border-radius: 12px;
      box-shadow: var(--shadow);
      border: 1px solid #eceaf6;
      transform: translateX(140%); opacity: 0;
      transition: transform .4s cubic-bezier(.2,.9,.2,1), opacity .4s;
    }
    .toast.show { transform: translateX(0); opacity: 1; }
    .toast .badge {
      width: 30px; height: 30px; border-radius: 8px; flex: none;
      background: linear-gradient(135deg, var(--ok), #34d399);
      color: #fff; display: grid; place-items: center; font-size: 16px;
    }
    .toast .t-title { font-weight: 600; font-size: 14px; }
    .toast .t-sub { font-size: 12px; color: var(--muted); }

    /* ============== RESPONSIVE ============== */
    @media (max-width: 880px) {
      .app { flex-direction: column; }
      .brand { padding: 36px 28px; min-height: 280px; }
      .stats { margin-top: 24px; }
      .form-side { padding: 32px 20px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- LEFT -->
    <section class="brand">
      <div class="brand-top">
        <div class="logo"><span class="dot">◆</span> Employee Directory</div>
      </div>
      <div class="hero">
        <h1>Onboard a new<br><span>team member</span></h1>
        <p>Add employees to the directory. Every submission is written straight to your Google Sheet in real time.</p>
        <div class="stats">
          <div class="stat">
            <div class="num" id="statCount">—</div>
            <div class="lbl">Employees</div>
          </div>
          <div class="stat">
            <div class="num" id="statNext">—</div>
            <div class="lbl">Next ID</div>
          </div>
        </div>
      </div>
    </section>

    <!-- RIGHT -->
    <section class="form-side">
      <div class="card">
        <h2>Add Employee</h2>
        <p class="sub">Fill in the details below and submit to add them to the sheet.</p>

        <div class="err" id="errBox"></div>

        <form id="empForm" autocomplete="off">
          <div class="row">
            <div class="field">
              <label for="id">Employee ID</label>
              <div class="control">
                <input id="id" name="id" type="text" placeholder="EMP107" required>
              </div>
            </div>
            <div class="field">
              <label for="name">Full Name</label>
              <div class="control">
                <input id="name" name="name" type="text" placeholder="e.g. Arjun Nair" required>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label for="department">Department</label>
              <div class="control has-icon">
                <select id="department" name="department" required>
                  <option value="" disabled selected>Select…</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label for="region">Region</label>
              <div class="control has-icon">
                <select id="region" name="region" required>
                  <option value="" disabled selected>Select…</option>
                </select>
              </div>
            </div>
          </div>

          <button type="submit" class="submit" id="submitBtn">
            <span class="spinner"></span>
            <span class="btn-label">Add Employee</span>
          </button>
        </form>
      </div>
    </section>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast">
    <div class="badge">✓</div>
    <div>
      <div class="t-title" id="toastTitle">Saved</div>
      <div class="t-sub" id="toastSub">Added to the sheet</div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function fillSelect(sel, items, current) {
      // keep the disabled placeholder, append options
      items.forEach(function (v) {
        const o = document.createElement('option');
        o.value = v; o.textContent = v;
        sel.appendChild(o);
      });
    }

    function loadInitial() {
      google.script.run
        .withSuccessHandler(function (d) {
          fillSelect($('department'), d.departments);
          fillSelect($('region'), d.regions);
          $('statCount').textContent = d.count;
          $('statNext').textContent = d.nextId;
          $('id').value = d.nextId;
          $('id').placeholder = d.nextId;
        })
        .withFailureHandler(function (e) { showError(e.message); })
        .getInitialData();
    }

    function showError(msg) {
      const box = $('errBox');
      box.textContent = msg;
      box.classList.add('show');
    }
    function clearError() { $('errBox').classList.remove('show'); }

    function setLoading(on) {
      const btn = $('submitBtn');
      btn.disabled = on;
      btn.classList.toggle('loading', on);
      btn.querySelector('.btn-label').textContent = on ? 'Saving…' : 'Add Employee';
    }

    function showToast(title, sub) {
      $('toastTitle').textContent = title;
      $('toastSub').textContent = sub;
      const t = $('toast');
      t.classList.add('show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(function () { t.classList.remove('show'); }, 3200);
    }

    $('empForm').addEventListener('submit', function (e) {
      e.preventDefault();
      clearError();

      const data = {
        id: $('id').value,
        name: $('name').value,
        department: $('department').value,
        region: $('region').value
      };

      if (!data.id || !data.name || !data.department || !data.region) {
        showError('Please fill in all fields.');
        return;
      }

      setLoading(true);
      google.script.run
        .withSuccessHandler(function (res) {
          setLoading(false);
          showToast(res.message, 'Total employees: ' + res.count);
          // reset form for the next entry
          $('empForm').reset();
          $('department').selectedIndex = 0;
          $('region').selectedIndex = 0;
          $('statCount').textContent = res.count;
          $('statNext').textContent = res.nextId;
          $('id').value = res.nextId;
          $('name').focus();
        })
        .withFailureHandler(function (err) {
          setLoading(false);
          showError(err.message);
        })
        .addEmployee(data);
    });

    loadInitial();
  </script>
</body>
</html>
